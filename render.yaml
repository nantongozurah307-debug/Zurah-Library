services:
  - type: web
    name: bibliotech-backend
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: gunicorn backend.app:app
    envVars:
      - key: PORT
        value: 5001
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        value: sqlite:////data/library.db
    disk:
      name: sqlite-data
      mountPath: /data
      sizeGB: 1
